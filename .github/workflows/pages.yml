name: Deploy static site to GitHub Pages

# Triggered on pushes to main and on demand. The workflow uses only
# trusted GitHub-provided values (steps.deployment.outputs.page_url); no
# untrusted user input is interpolated into any `run:` step, so the
# command-injection patterns called out in
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
# do not apply here.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Reject unresolved merge conflicts
        run: |
          set -euo pipefail
          if grep -RInE '^(<<<<<<< .+|=======$|>>>>>>> .+)' \
            .github content static templates app.py build_static.py site_config.py tiny_markdown.py README.md; then
            echo "::error::unresolved merge conflict markers found"
            exit 1
          fi

      - name: Build static site
        run: python build_static.py

      - name: Verify generated site
        run: |
          set -euo pipefail
          for page in index.html country-england.html team-manchester-united.html sources.html; do
            test -f "dist/$page" || { echo "::error::missing dist/$page"; exit 1; }
          done
          test -f dist/static/mu.css || { echo "::error::missing dist/static/mu.css"; exit 1; }
          if grep -RInE '^(<<<<<<< .+|=======$|>>>>>>> .+)' dist; then
            echo "::error::generated site contains unresolved merge conflict markers"
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
