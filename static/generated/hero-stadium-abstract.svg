<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Abstract football stadium hero image</title>
  <desc id="desc">Original abstract stadium illustration in red, gold, and charcoal for the Soccer Culture Project.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="900">
      <stop offset="0" stop-color="#181820"/>
      <stop offset=".65" stop-color="#0c0c0e"/>
      <stop offset="1" stop-color="#070709"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="15%" r="65%">
      <stop offset="0" stop-color="rgba(200,16,46,.34)"/>
      <stop offset="1" stop-color="rgba(200,16,46,0)"/>
    </radialGradient>
    <linearGradient id="pitch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#215b35"/>
      <stop offset="1" stop-color="#0d2e1b"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <path d="M120 540 C400 360 1200 360 1480 540 L1390 760 C1120 650 480 650 210 760 Z" fill="#111116" stroke="rgba(255,255,255,.12)" stroke-width="3"/>
  <path d="M220 550 C470 420 1130 420 1380 550 L1330 642 C1085 555 515 555 270 642 Z" fill="#c8102e" opacity=".82"/>
  <path d="M300 586 C520 505 1080 505 1300 586" fill="none" stroke="#ffd86b" stroke-width="8" opacity=".75" stroke-linecap="round"/>
  <ellipse cx="800" cy="710" rx="470" ry="115" fill="url(#pitch)" stroke="rgba(255,255,255,.18)" stroke-width="4"/>
  <path d="M330 710 H1270 M800 595 V825" stroke="rgba(255,255,255,.22)" stroke-width="3"/>
  <ellipse cx="800" cy="710" rx="80" ry="24" fill="none" stroke="rgba(255,255,255,.28)" stroke-width="3"/>
  <g opacity=".72">
    <path d="M190 535 L340 300 M320 498 L445 275 M1410 535 L1260 300 M1280 498 L1155 275" stroke="rgba(255,255,255,.32)" stroke-width="5"/>
    <path d="M260 340 H1340" stroke="rgba(255,255,255,.22)" stroke-width="5"/>
    <path d="M380 280 H1220" stroke="rgba(255,255,255,.16)" stroke-width="3"/>
  </g>
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="700" text-anchor="middle">
    <text x="800" y="185" font-size="82" fill="#f4f4f6" letter-spacing="-2">Manchester United</text>
    <text x="800" y="232" font-size="25" fill="#ffd86b" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="7">SOCCER CULTURE PROJECT</text>
  </g>
</svg>
